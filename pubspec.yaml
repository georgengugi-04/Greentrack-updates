name: greentrack
description: GreenTrack - Farm-to-Table Supply Chain Traceability
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

  # State & Navigation
  flutter_riverpod: ^2.4.9
  go_router: ^13.2.0

  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  qr_flutter: ^4.1.0

  # Utils
  collection: ^1.18.0
  uuid: ^4.3.3
  intl: ^0.19.0
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
