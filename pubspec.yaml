name: greentrack
description: GreenTrack - Garden-to-Table Crop Tracking & Analytics App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.2.0

  # UI & Design
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.0
  fl_chart: ^0.67.0
  syncfusion_flutter_charts: ^24.2.6
  smooth_page_indicator: ^1.1.0
  flutter_staggered_grid_view: ^0.7.0
  flutter_staggered_animations: ^1.1.1
  percent_indicator: ^4.2.3
  glassmorphism: ^3.0.0
  liquid_progress_indicator_v2: ^1.0.2

  # Data & Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  path_provider: ^2.1.2

  # Camera & Media
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  photo_view: ^0.14.0

  # Notifications
  flutter_local_notifications: ^17.1.1
  awesome_notifications: ^0.9.1+1

  # Charts & Data Viz
  graphic: ^2.3.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  collection: ^1.18.0
  table_calendar: ^3.0.9
  timeline_tile: ^2.0.0
  step_progress_indicator: ^1.0.2
  badges: ^3.1.2
  flutter_slidable: ^3.1.0
  expandable: ^5.0.1
  readmore: ^3.0.0
  dotted_border: ^2.1.0
  custom_paint_diagram_layer: ^0.3.0
  flutter_svg: ^2.0.10+1
  qr_flutter: ^4.1.0

  # Connectivity
  connectivity_plus: ^6.0.2

  # Date/Time
  jiffy: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1
  riverpod_generator: ^2.3.9
  custom_lint: ^0.6.3
  riverpod_lint: ^2.3.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Playfair
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
